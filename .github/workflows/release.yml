name: Release

# Triggered by pushing a `v*` tag (e.g. `v0.1.0`). Builds and publishes the
# package to the npm registry under `@appcat/react-native-sdk`. The closed-
# source iOS xcframework and Android AAR are vendored inside the repo
# (`ios/AppCatCoreKit.xcframework` and `android/libs/appcat-core.aar`) and ship
# inside the published tarball.
#
# Requires the `NPM_TOKEN` repository secret (npm automation token with
# publish access to the `@appcat` scope).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify vendored binaries are present
        run: |
          test -d ios/AppCatCoreKit.xcframework || (echo "Missing ios/AppCatCoreKit.xcframework" >&2; exit 1)
          test -f android/libs/appcat-core.aar || (echo "Missing android/libs/appcat-core.aar" >&2; exit 1)

      - name: Verify version matches tag
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
